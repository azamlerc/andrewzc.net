<!DOCTYPE html>
<html>
<head>
  <title>✏️ Edit</title>
  <meta charset="UTF-8">
  <meta name="andrewzc" content="auto" />
  <meta name="viewport" content="width=device-width, initial-scale=0.45">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="edit.css">
</head>

<body>
  <div id="headline" class="headline">✏️ Edit</div>

  <div class="status" style="display:flex; align-items:center; gap:20px;">
    <div>
      <button id="saveBtn" class="pill" type="button">Save</button>
      <button id="resetBtn" class="pill" type="button">Reset</button>
      <button id="deleteBtn" class="pill" type="button" style="display:none;">Delete</button>
    </div>
    <div id="status">Loading…</div>
  </div>
  
  <div id="card" class="card" style="display:none;">
    <div class="row rowCompact">
      <div class="field fieldCompact">
        <div class="fieldHeader">
          <span class="label">Icons</span>
        </div>
        <input id="icons" class="input inputCompact" type="text" spellcheck="false">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <div class="fieldHeader">
          <span class="label">Name</span>
        </div>
        <input id="name" class="input" type="text" spellcheck="false">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <div class="fieldHeader">
          <span class="label" id="linkLabel" style="cursor:pointer;" title="Click to look up Wikipedia link">Link</span>
					<button id="openBtn" class="pill inlineFieldButton" type="button">Open</button>
        </div>
        <input id="link" class="input inputWithButton" type="url" spellcheck="false">
      </div>
    </div>
    
    <div class="row">
      <div class="field">
        <div class="fieldHeader">
          <span class="label" id="coordsLabel" style="cursor:pointer;" title="Click to look up coords from link">Coords</span>
					<button id="mapBtn" class="pill inlineFieldButton" type="button">Map</button>
        </div>
        <input id="coords" class="input inputWithButton" type="text" spellcheck="false">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <div class="fieldHeader">
          <span class="label" id="cityLabel" style="cursor:pointer;" title="Click to look up nearest city from coords">City</span>
        </div>
        <input id="city" class="input" type="text" spellcheck="false">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <div class="fieldHeader">
          <span class="label" id="referenceLabel" style="cursor:pointer;" title="Click to copy city to reference">Reference</span>
        </div>
        <input id="reference" class="input" type="text" spellcheck="false">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <div class="fieldHeader">
          <span class="label">Prefix</span>
        </div>
        <input id="prefix" class="input" type="text" spellcheck="false">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <div class="fieldHeader">
          <span class="label">Info</span>
        </div>
        <input id="info" class="input" type="text" spellcheck="false">
      </div>
    </div>

    <div class="row rowCompact">
      <div class="field fieldCompact">
        <div class="fieldHeader">
          <span class="label">Badges</span>
        </div>
        <input id="badges" class="input inputCompact" type="text" spellcheck="false">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <div class="fieldHeader">
          <span class="label">Caption</span>
        </div>
        <input id="caption" class="input" type="text" spellcheck="false">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <div class="fieldHeader">
          <span class="label">Flags</span>
        </div>
        <span class="pillWrap">
          <button id="been" class="pill been" type="button" aria-pressed="false">Been</button>
          <button id="strike" class="pill strike" type="button" aria-pressed="false">Strike</button>
        </span>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <div class="fieldHeader">
          <span class="label">Images</span>
          <span class="fieldActions">
            <button id="uploadImagesBtn" class="pill" type="button">Upload</button>
          </span>
        </div>
        <span class="imagesWrap">
          <div class="imagesToolbar">
            <span id="imagesHelp" class="imagesHelp">Save new entities before uploading images.</span>
          </div>
          <div id="imageGrid" class="thumbGrid"></div>
          <input id="imageInput" type="file" accept="image/*" multiple style="display:none;">
        </span>
      </div>
    </div>
  </div>

  <script type="module" src="edit.js"></script>
</body>
</html>
