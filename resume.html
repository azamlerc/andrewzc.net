<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andrew Zamler-Carhart — Resume</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Avenir, 'Avenir Next', sans-serif;
      background: white;
      color: #222;
      padding: 20px;
      max-width: 1080px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 48pt;
      font-weight: 500;
      letter-spacing: -0.5px;
      display: inline;
    }

    .pronouns {
      font-size: 18pt;
      color: #999;
      font-weight: 400;
      margin-left: 18px;
      margin-bottom: 10px;
    }

    /* ── Two-column layout ── */
    .layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 200px;
      flex-shrink: 0;
      font-size: 12pt;
      color: #444;
      line-height: 1.7;
    }

    .sidebar .venn {
      margin-bottom: 28px;
    }

    .sidebar-section {
      margin-bottom: 20px;
    }

    .sidebar-section h3 {
      font-size: 10pt;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #bbb;
      margin-bottom: 4px;
    }

    .sidebar-section a {
      color: #444;
      text-decoration: none;
    }

    .sidebar-section a {
      color: #0066cc;
    }

    /* ── Venn Diagram ── */
    .venn svg {
      display: block;
    }

    /* ── Experience ── */
    .experience {
      flex: 1;
      min-width: 0;
    }

    /* Each entry is a table */
    .entry {
      width: 100%;
    }

    /* Header row: year | logo | company+titles | location+url */
    .entry-header {
      display: table;
      width: 100%;
      table-layout: fixed;
    }

    .col-year {
      display: table-cell;
      width: 50px;
      vertical-align: middle;
      text-align: right;
      padding-right: 10px;

      font-size: 11pt;
      font-weight: 500;
      line-height: 1.3;
      color: #bbb;
    }

    .col-logo {
      display: table-cell;
      width: 92px;
      vertical-align: middle;
      text-align: center;
      position: relative;
    }

    .col-company {
      display: table-cell;
      vertical-align: middle;
      padding-left: 8px;
    }

    .col-location {
      display: table-cell;
      vertical-align: middle;
      text-align: right;
      padding-left: 8px;
    }

    /* Company name */
    .company-name {
      font-size: 26pt;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.3px;
    }

    .titles-row {
      display: flex;
      margin-top: 2px;
      flex-wrap: wrap;
    }

    .title-item {
      font-size: 14pt;
      color: #999;
      padding-left: 1px;
      white-space: nowrap;
    }

    .title-years {
      font-size: 8.5pt;
      color: #bbb;
      margin-left: 3px;
    }

    .location-text {
      font-size: 12pt;
      color: #888;
      line-height: 1.4;
      white-space: nowrap;
    }

    .url-link {
      font-size: 12pt;
      color: #0066cc;
      text-decoration: none;
      display: block;
    }

    .url-link:hover {
      text-decoration: underline;
    }

    /* Content row */
    .entry-content {
      display: table;
      width: 100%;
      table-layout: fixed;
    }

    .content-spacer-year {
      display: table-cell;
      width: 50px;
    }

    .content-spacer-logo {
      display: table-cell;
      width: 92px;
      position: relative;
    }

    /* The vertical line runs through the logo column */
    .content-spacer-logo::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 4px;
      bottom: 4px;
      width: 4px;
      background: #ddd;
      transform: translateX(-50%);
    }

    .content-body {
      display: table-cell;
      padding-left: 10px;
      padding-top: 10px;
      padding-bottom: 20px;
      vertical-align: top;
      font-size: 12pt;
      color: #333;
    }

    .content-body ul {
      list-style: none;
      padding: 0;
      margin: 8px 0 10px 0;
    }

    .content-body ul li {
      padding-left: 16px;
      position: relative;
      margin-bottom: 10px;
    }

    .content-body ul li::before {
      content: '•';
      position: absolute;
      left: 2px;
      color: #aaa;
    }

    .content-body .outro {
      margin-top: 12px;
      color: #333;
    }

    /* Logo circle */
    .logo-wrap {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto;
      z-index: 2;
    }

    .logo-wrap img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: contain;
      background: white;
      border: 4px solid #ccc;
      display: block;
      padding: 6px;
    }

    .logo-placeholder {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #f0f0f0;
      border: 4px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9pt;
      color: #999;
      text-align: center;
      font-weight: 600;
    }

    /* The vertical line in the logo column of the header row */
    .col-logo-inner {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    /* Divider between entries — none needed, vertical line handles it */

    @media print {
      body { padding: 20px; }
      .url-link { color: #0066cc; }
    }
  </style>
</head>
<body>

  <!-- ── Static Header ── -->
  <div class="header">
    <h1>Andrew Zamler-Carhart</h1>

  </div>

  <div class="layout">

    <div class="sidebar">

      <div class="venn">

      </div>

      <div class="sidebar-section">
        <h3>Contact</h3>
        76 Oscawana Heights Rd<br>
        Putnam Valley, NY 10579<br>
        917-743-4969<br>
        <a href="mailto:azc@mac.com">azc@mac.com</a><br>
        <a href="https://andrewzc.net">andrewzc.net</a><br>
        <a href="https://github.com/azamlerc">github.com/azamlerc</a>
      </div>

      <div class="sidebar-section">
        <h3>Languages</h3>
        🇺🇸 English<br>
        🇫🇷 French<br>
        🇳🇱 Dutch<br>
        🇷🇺 Russian

      <div class="sidebar-section">
        <h3>Citizenship</h3>
        🇺🇸 United States<br>
        🇫🇷 France
      </div>

    </div>

    <!-- ── Dynamic Experience ── -->
    <div class="experience" id="experience">
      <!-- Rendered by JS -->
    </div>

  </div>

  <script src="resume.js"></script>

</body>
</html>
