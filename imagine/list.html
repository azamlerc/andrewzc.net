<!DOCTYPE html>
<html>
<head>
  <title>🖐️ Fingers</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800" />
  <link rel="stylesheet" href="../styles.css">
  <style>
    input[type="checkbox"] {
      transform: scale(2.0);
      position: relative;
      bottom: 5px;
      margin-right: 6px;
    }
    .options td {
      padding-right: 20px;
      font: 18pt Avenir;
      white-space: nowrap;
    }
    .promptTitle { font: 48pt Avenir; color: #999; }
    .prompt { font: 18pt Avenir; color: #999; }
    #searchField, select { font: 18pt Avenir; background-color: white; }
    .emoji { letter-spacing: 5px; }
    .emoji2 { font: 48pt Avenir; margin-bottom: -10px; }
    .items { white-space: normal; }
  </style>
</head>
<body>
<div id="header">
  <div class="headline">🖐️ Fingers</div>
  <table class="options">
    <tr class="caption" id="models">
      <td class="dark">models:</td>
      <!-- Active model checkboxes injected by JS -->
    </tr>
    <tr class="caption" id="models-archive">
      <td class="dark">archive:</td>
      <!-- Deprecated model checkboxes injected by JS -->
    </tr>
    <tr class="caption" id="styles">
      <td class="dark">styles:</td>
      <td><input type="checkbox" id="style-photo"   name="style" value="photo"   checked> photo</td>
      <td><input type="checkbox" id="style-art"     name="style" value="art"     checked> artistic</td>
      <td><input type="checkbox" id="style-lego"    name="style" value="lego"    checked> lego</td>
      <td><input type="checkbox" id="style-anime"   name="style" value="anime"   checked> anime</td>
      <td><input type="checkbox" id="style-pixar"   name="style" value="pixar"   checked> pixar</td>
    </tr>
    <tr class="caption" id="themes">
      <td class="dark">theme:</td>
      <td colspan="4">
        <select id="themeMenu" name="themes" onchange="selectTheme()">
          <option value="">all</option>
          <!-- Options injected by JS from prompts data -->
        </select>
        &nbsp;
        <input type="text" size="18" id="searchField" placeholder="" oninput="doSearch()">
      </td>
    </tr>
  </table>
  <br>
</div>
<div id="main" class="items"></div>
<script src="image-viewer.js"></script>
<script src="config.js"></script>
<script>

  let allModels  = [];  // model objects from API, in display order
  let modelStyles = {}; // model id → styles[], built from API response

  let allPrompts = [];
  // imageSet: Map of `${promptId}|${model}|${style}` → true, for fast existence checks
  let imageSet = new Set();

  const urlParams   = new URLSearchParams(window.location.search);
  let selectedTheme = urlParams.get("theme") || localStorage.getItem("selectedTheme") || "";
  let searchTerm    = urlParams.get("search") || localStorage.getItem("searchTerm")   || "";
  searchField.value = searchTerm;

  async function init() {
    const [promptsRes, imagesRes, modelsRes] = await Promise.all([
      fetch(`${API_BASE}/imagine/prompts`),
      fetch(`${API_BASE}/imagine/images`),
      fetch(`${API_BASE}/imagine/models`),
    ]);
    const [promptsData, imagesData, modelsData] = await Promise.all([
      promptsRes.json(), imagesRes.json(), modelsRes.json(),
    ]);

    // Build imageSet for existence checks; also compute most-recent createdAt per prompt
    const promptLastCreated = {};
    for (const img of (imagesData.images || [])) {
      imageSet.add(`${img.promptId}|${img.model}|${img.style}`);
      const t = img.createdAt ? new Date(img.createdAt).getTime() : 0;
      if (!promptLastCreated[img.promptId] || t > promptLastCreated[img.promptId]) {
        promptLastCreated[img.promptId] = t;
      }
    }

    // Sort prompts: most recently generated first; prompts with no images go last (alphabetical)
    allPrompts = promptsData.prompts || [];
    allPrompts.sort((a, b) => {
      const ta = promptLastCreated[a.id] || 0;
      const tb = promptLastCreated[b.id] || 0;
      if (tb !== ta) return tb - ta;
      return a.id.localeCompare(b.id);
    });

    allModels = modelsData.models || [];
    for (const m of allModels) modelStyles[m.id] = m.styles;
    buildModelCheckboxes();
    buildThemeMenu();

    loadCheckboxState();
    selectOptionById(themeMenu, selectedTheme);
    searchField.value = searchTerm;
    update();
  }

  function buildThemeMenu() {
    const categories = new Set();
    for (const p of allPrompts) {
      const raw = p.categories || [];
      for (const entry of raw) {
        for (const cat of entry.split(",")) {
          const trimmed = cat.trim();
          if (trimmed) categories.add(trimmed);
        }
      }
    }
    const sorted = [...categories].sort();
    for (const cat of sorted) {
      const option = document.createElement("option");
      option.value = cat;
      option.textContent = cat;
      themeMenu.appendChild(option);
    }
  }

  function buildModelCheckboxes() {
    const activeRow   = document.getElementById("models");
    const archiveRow  = document.getElementById("models-archive");
    while (activeRow.children.length  > 1) activeRow.removeChild(activeRow.lastChild);
    while (archiveRow.children.length > 1) archiveRow.removeChild(archiveRow.lastChild);

    for (const model of allModels) {
      const row = model.deprecated ? archiveRow : activeRow;
      const td  = document.createElement("td");
      const cb  = document.createElement("input");
      cb.type    = "checkbox";
      cb.id      = `model-${model.id}`;
      cb.name    = "model";
      cb.value   = model.id;
      cb.checked = !model.deprecated;
      cb.addEventListener("change", update);
      td.appendChild(cb);
      td.appendChild(document.createTextNode(" " + model.id));
      row.appendChild(td);
    }
  }

  function hasImage(promptId, model, style) {
    return imageSet.has(`${promptId}|${model}|${style}`);
  }

  function splitCategories(item) {
    const cats = [];
    for (const entry of (item.categories || [])) {
      for (const cat of entry.split(",")) {
        const trimmed = cat.trim();
        if (trimmed) cats.push(trimmed);
      }
    }
    return cats;
  }

  function containsSearchTerm(item) {
    const term   = searchTerm.toLowerCase();
    const theme  = selectedTheme.toLowerCase();
    const cats   = splitCategories(item);
    const name   = item.name.toLowerCase();
    const prompt = (item.prompt || "").toLowerCase();

    const matchesTerm = !term || name.includes(term) || prompt.includes(term) || cats.some(c => c.toLowerCase().includes(term));
    const matchesTheme = !theme || item.id.includes(theme) || name.includes(theme) || cats.some(c => c.toLowerCase() === theme) || prompt.includes(theme);
    return matchesTerm && matchesTheme;
  }

  function update() {
    const selectedModels = [...checkedBoxes("models"), ...checkedBoxes("models-archive")];
    const selectedStyles = checkedBoxes("styles");

    main.innerHTML = "";

    for (const item of allPrompts.filter(containsSearchTerm)) {
      const itemDiv   = document.createElement("div");
      const anchor    = document.createElement("a");
      const titleDiv  = document.createElement("div");
      const promptDiv = document.createElement("div");

      anchor.name = item.id;
      titleDiv.textContent  = item.emoji.join(" ") + " " + item.name;
      titleDiv.classList.add("promptTitle");
      promptDiv.textContent = item.prompt;
      promptDiv.classList.add("prompt");
      itemDiv.appendChild(anchor);
      itemDiv.appendChild(titleDiv);
      itemDiv.appendChild(promptDiv);

      for (const model of selectedModels) {
        for (const style of selectedStyles) {
          if (!(modelStyles[model] || []).includes(style)) continue;
          if (!hasImage(item.id, model, style)) continue;

          const suffix = style === "photo" ? "" : `-${style}`;
          const link   = document.createElement("a");
          const img    = document.createElement("img");

          link.href   = `detail.html?id=${encodeURIComponent(item.id)}&model=${encodeURIComponent(model)}&style=${encodeURIComponent(style)}`;
          link.target = "_blank";

          img.src     = `${IMAGE_BASE}/imagine/${model}/tn/${item.id}${suffix}.jpg`;
          img.alt     = `${item.name} / ${model} / ${style}`;
          img.loading = "lazy";
          img.classList.add("hike");

          link.appendChild(img);
          itemDiv.appendChild(link);
        }
      }

      main.appendChild(itemDiv);
    }
  }

  function selectTheme() {
    selectedTheme = themeMenu.options[themeMenu.selectedIndex].value;
    localStorage.setItem("selectedTheme", selectedTheme);
    update();
  }

  function doSearch() {
    const val = searchField.value.toLowerCase();
    if (searchTerm !== val) {
      searchTerm = val;
      localStorage.setItem("searchTerm", searchTerm);
      update();
    }
  }

  // Style checkboxes are static HTML; model checkboxes are built dynamically in buildModelCheckboxes().
  document.querySelectorAll("#styles input[type=checkbox]").forEach(cb => cb.addEventListener("change", update));

  function selectOptionById(menu, optionId) {
    for (let i = 0; i < menu.options.length; i++) {
      if (menu.options[i].value === optionId) { menu.selectedIndex = i; break; }
    }
  }

  init();

</script>
</body>
</html>
