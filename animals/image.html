<!DOCTYPE html>
<html>
<head>
  <title>🐸 Animals</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=880" />
  <link rel="stylesheet" href="../styles.css">
  <style>
    .selected {
      float: left;
      width: 820px;
      height: 820px;
    }
    .textBox {
      padding-top: 25px;
      padding-left: 25px;
      height: 365px;
      width: 365px;
      vertical-align: top;
      margin: 6px 10px 14px 10px;
      background-color: #EEE;
    }
    .emoji {
      font: 120pt Avenir;
      color: #999;
      line-height: 115%;
      vertical-align: bottom;
    }
    .title {
      font: 64pt Avenir;
      color: black;
      line-height: 110%;
      vertical-align: bottom;
      hyphens: auto;
    }
    #controls {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2;
      font: 32pt Avenir;
    }
    @media (prefers-color-scheme: dark) {
      .textBox { background-color: #222; color: #999; }
      .title   { color: white; }
    }
  </style>
</head>
<body>
<div id="main"></div>
<div id="controls">
  <a href="index.html">🏠</a><br>
  <a onclick="selectPrev()">⬅️</a><br>
  <a onclick="selectNext()">➡️</a><br>
  <a onclick="selectRandom()">🔀</a><br>
  <a onclick="selectPrevStyle()">⬆️</a><br>
  <a onclick="selectNextStyle()">⬇️</a><br>
</div>
<script src="config.js"></script>
<script>

  const params   = new URLSearchParams(window.location.search);
  const artistId = params.get("artist") || "";
  const animalId = params.get("animal") || "";

  let artist      = null;   // artist object from API
  let animalList  = [];     // shortAnimals or animals depending on artist.short
  let animalIndex = 0;
  let imageRecords = [];    // image records for this artist from the API
  let imgs = [];
  let selectedStyle = null;

  // Prompt templates shown below the image grid on the detail page.
  const prompts = {
    corbijn:        (plural)        => `A band of three ${plural} in the casbah of Casablanca, in black hats, silver jewelry and sunglasses, in the style of Anton Corbijn. Silver gelatin photo.`,
    lachapelle:     (plural)        => `A band of three ${plural} in colorful tropical clothing in Miami, striking crazy poses, as photographed by David LaChapelle.`,
    saudek:         (plural)        => `A group of three ${plural} in Prague, in the style of Jan Saudek.`,
    picasso:        (plural)        => `A drawing in the style of Pablo Picasso of a band of three ${plural}.`,
    "von-gloeden":  (plural)        => `A vintage photograph in the style of Wilhelm von Gloeden of three ${plural} in Taormina. Sepia tone.`,
    hope:           (_plural, lower) => `A charismatic ${lower} in the style of a Barack Obama campaign poster.`,
    anatomy:        (_plural, lower) => `Leonardo DaVinci's anatomical drawing of a ${lower}.`,
    cloud:          (_plural, lower) => `A realistic photo of a cloud that looks like a ${lower}.`,
    crayon:         (_plural, lower) => `A crayon drawing made by a three year old of a ${lower} playing with a child, taped to the wall.`,
    delftware:      (_plural, lower) => `Delftware porcelain with a repeating ${lower} motif.`,
    hieroglyphics:  (_plural, lower) => `Hieroglyphics of a ${lower} god on the wall of an ancient Egyptian temple.`,
    ice:            (_plural, lower) => `A dynamic ice sculpture of a ${lower} in the lobby of a modern hotel.`,
    icon:           (_plural, lower) => `A Russian orthodox icon of a saint ${lower}.`,
    neon:           (_plural, lower) => `A neon sign of a ${lower} in a shop window.`,
    noir:           (_plural, lower) => `A scene from a black and white 1950s noir film with a ${lower}.`,
    origami:        (_plural, lower) => `Origami of a ${lower} on a solid color background.`,
    "pop-art":      (_plural, lower) => `A pop art painting of a ${lower}.`,
    socialist:      (_plural, lower) => `Socialist realist sculpture of a ${lower} in the Soviet Union in 1932.`,
    space:          (_plural, lower) => `Anime graphic of a battle in outer space with an insane space ${lower}.`,
    "stained-glass":(_plural, lower) => `A stained glass window from a gothic cathedral with an austere looking ${lower}.`,
    "street-art":   (_plural, lower) => `Street art of a ${lower} on the side of an industrial building.`,
    "sumi-e":       (_plural, lower) => `A sumi-e painting of a ${lower}.`,
    "ukiyo-e":      (_plural, lower) => `A ukiyo-e portrait of a ${lower} and a geisha at a green tea ceremony.`,
    watercolor:     (_plural, lower) => `A watercolor painting of a ${lower} on an easel.`,
  };

  async function init() {
    const [artistsRes, imagesRes] = await Promise.all([
      fetch(`${API_BASE}/animals/artists`),
      fetch(`${API_BASE}/animals/images?artist=${encodeURIComponent(artistId)}`),
    ]);
    const [artistsData, imagesData] = await Promise.all([artistsRes.json(), imagesRes.json()]);

    artist       = (artistsData.artists || []).find(a => a.id === artistId) || null;
    imageRecords = imagesData.images || [];

    if (!artist) { main.innerHTML = "Artist not found."; return; }

    animalList  = artist.short ? shortAnimals : animals;
    animalIndex = animalList.findIndex(a => a[1] === animalId);
    if (animalIndex === -1) animalIndex = 0;

    const animal = animalList[animalIndex];
    document.title = animal[0] + " " + animal[1];

    update();
  }

  function stylesForAnimal(animalName) {
    return imageRecords
      .filter(r => r.animal === animalName)
      .map(r => r.style);
  }

  function update() {
    main.innerHTML = "";
    imgs = [];

    const animal       = animalList[animalIndex];
    const emoji        = animal[0];
    const title        = animal[1];
    const displayTitle = replaceSubstrings(title, hyphenations);
    const lower        = title.toLowerCase();
    const plural       = makePlural(lower);

    const styles     = stylesForAnimal(title);
    const titleIndex = randomNumber(0, Math.max(styles.length - 1, 0));
    let count = 0;

    for (const style of styles) {
      const suffix  = style === "photo" ? "" : `-${style}`;
      const tnUrl   = `${IMAGE_BASE}/animals/${artistId}/tn/${artistId}-${title}${suffix}.jpg`;
      const fullUrl = `${IMAGE_BASE}/animals/${artistId}/${artistId}-${title}${suffix}.jpg`;

      const link = document.createElement("a");
      const img  = document.createElement("img");

      link.addEventListener("click", () => {
        if (img.classList.contains("selected")) {
          selectNextStyle();
        } else {
          selectedStyle = style;
          imgs.forEach(i => i.classList.remove("selected"));
          selectImage(img);
        }
      });

      img.fullSrc = fullUrl;
      img.src     = tnUrl;
      img.classList.add("hike");
      imgs.push(img);
      link.appendChild(img);
      main.appendChild(link);

      if (count === titleIndex) {
        const emojiDiv = document.createElement("div");
        emojiDiv.innerHTML = emoji;
        const titleDiv = document.createElement("div");
        titleDiv.classList.add("title");
        titleDiv.innerHTML = displayTitle;
        emojiDiv.appendChild(titleDiv);
        emojiDiv.classList.add("hike", "textBox", "emoji");
        main.appendChild(emojiDiv);
      }

      count++;
    }

    const promptFn  = prompts[artistId];
    const promptText = promptFn ? promptFn(plural, lower) : "";
    if (promptText) {
      const promptDiv = document.createElement("div");
      promptDiv.innerHTML = promptText;
      promptDiv.classList.add("hike", "caption", "textBox");
      main.appendChild(promptDiv);
    }

    selectImage(randomObject(imgs), false);
  }

  document.addEventListener("keydown", function(event) {
    switch (event.key) {
      case "ArrowUp":    selectPrevStyle(); break;
      case "ArrowDown":  selectNextStyle(); break;
      case "ArrowLeft":  selectPrev();      break;
      case "ArrowRight": selectNext();      break;
      case "Enter":      selectRandom();    break;
      case "Escape":     window.location = "index.html"; break;
      default: return;
    }
    event.preventDefault();
  });

  function navigate(index) {
    const animal = animalList[index];
    window.location = `image.html?artist=${artistId}&animal=${encodeURIComponent(animal[1])}`;
  }

  function selectNext(inc) {
    if (![-1, 0, 1].includes(inc)) inc = 1;
    if (inc === 0) {
      navigate(randomNumber(0, animalList.length - 1));
    } else {
      navigate((animalIndex + inc + animalList.length) % animalList.length);
    }
  }

  function selectPrev()   { selectNext(-1); }
  function selectRandom() { selectNext(0);  }

  function selectNextStyle() { selectVisibleImage(imgs, +1); }
  function selectPrevStyle() { selectVisibleImage(imgs, -1); }

  function selectVisibleImage(images, direction) {
    let selectedIndex = images.findIndex(img => img.classList.contains("selected"));

    if (selectedIndex === -1) {
      const idx = direction === 1
        ? images.findIndex(img => img.style.display !== "none")
        : [...images].reverse().findIndex(img => img.style.display !== "none");
      if (idx !== -1) selectImage(direction === 1 ? images[idx] : images[images.length - 1 - idx]);
      return;
    }

    images[selectedIndex].classList.remove("selected");
    let next = selectedIndex;
    do {
      next = (next + direction + images.length) % images.length;
    } while (images[next].style.display === "none" && next !== selectedIndex);
    selectImage(images[next]);
  }

  function selectImage(img, scroll = true) {
    if (!img) return;
    img.src = img.fullSrc;
    img.classList.add("selected");
    if (scroll) img.scrollIntoView({ behavior: "smooth", block: "center", inline: "center" });
  }

  function makePlural(word) {
    switch (word) {
      case "goose":         return "geese";
      case "ox":            return "oxen";
      case "water buffalo": return "water buffaloes";
      case "wolf":          return "wolves";
      case "mouse":         return "mice";
      case "fish":          return "fish";
      case "octopus":       return "octopi";
      case "fly":           return "flies";
      case "mosquito":      return "mosquitoes";
      case "cockroach":     return "cockroaches";
      case "butterfly":     return "butterflies";
      case "rhinoceros":    return "rhinoceroses";
      case "hippopotamus":  return "hippopotami";
      default:              return word + "s";
    }
  }

  function randomNumber(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function randomObject(array) {
    if (!array || array.length === 0) return null;
    return array[Math.floor(Math.random() * array.length)];
  }

  function replaceSubstrings(str, replacements) {
    for (const key in replacements) {
      str = str.replace(new RegExp(key, "g"), replacements[key]);
    }
    return str;
  }

  init();

</script>
</body>
</html>
